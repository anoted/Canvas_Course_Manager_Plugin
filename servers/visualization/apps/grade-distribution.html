<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Grade Distribution</title>
<style>
  :root {
    --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --axis:#c3c2b7; --hairline:rgba(11,11,11,.10);
    --s1:#2a78d6; --wash:rgba(11,11,11,.045);
  }
  :root[data-theme="dark"] {
    --surface:#1a1a19; --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --hairline:rgba(255,255,255,.10);
    --s1:#3987e5; --wash:rgba(255,255,255,.06);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; }
  body {
    background:var(--surface); color:var(--ink); padding:16px;
    font:13px/1.45 system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  h1 { font-size:15px; font-weight:600; margin:0; }
  .sub { color:var(--ink-2); font-size:12px; margin-top:2px; }
  .tiles { display:flex; gap:20px; margin:14px 0 4px; flex-wrap:wrap; }
  .tile .lbl { color:var(--ink-2); font-size:11px; }
  .tile .val { font-size:19px; font-weight:600; }
  .controls { display:flex; gap:8px; align-items:center; margin:10px 0 2px; }
  .controls label { color:var(--ink-2); font-size:12px; }
  select {
    background:var(--surface); color:var(--ink); border:1px solid var(--hairline);
    border-radius:6px; padding:3px 6px; font:inherit; font-size:12px;
  }
  #chart { position:relative; }
  svg { display:block; width:100%; }
  .bar { cursor:default; }
  .bar:hover, .bar.hot { opacity:.82; }
  #tip {
    position:absolute; pointer-events:none; display:none; z-index:2;
    background:var(--surface); border:1px solid var(--hairline); border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.18); padding:6px 9px; max-width:240px;
  }
  #tip .v { font-weight:600; font-size:13px; }
  #tip .k { color:var(--ink-2); font-size:11px; }
  details { margin-top:10px; }
  summary { color:var(--ink-2); font-size:12px; cursor:pointer; }
  table { border-collapse:collapse; margin-top:6px; font-size:12px; }
  th, td { text-align:left; padding:3px 14px 3px 0; border-bottom:1px solid var(--grid); }
  th { color:var(--ink-2); font-weight:500; }
  td.num { font-variant-numeric:tabular-nums; }
  #empty { color:var(--muted); padding:28px 0; font-size:12px; }
</style>
</head>
<body>
  <header>
    <h1 id="title">Grade Distribution</h1>
    <div class="sub" id="sub"></div>
  </header>
  <div id="app" hidden>
    <div class="tiles">
      <div class="tile"><div class="lbl">Mean</div><div class="val" id="mean"></div></div>
      <div class="tile"><div class="lbl">Median</div><div class="val" id="median"></div></div>
      <div class="tile"><div class="lbl">Min</div><div class="val" id="min"></div></div>
      <div class="tile"><div class="lbl">Max</div><div class="val" id="max"></div></div>
    </div>
    <div class="controls">
      <label for="bins">Bins</label>
      <select id="bins">
        <option value="auto" selected>Auto</option>
        <option>5</option><option>8</option><option>10</option><option>12</option><option>15</option>
      </select>
    </div>
    <div id="chart"><div id="tip"></div></div>
    <details>
      <summary>Data table</summary>
      <table><thead><tr><th>Score range</th><th>Students</th><th>Share</th></tr></thead><tbody id="tbody"></tbody></table>
    </details>
  </div>
  <div id="empty">Waiting for chart data&hellip;</div>

<script>/*__MCP_BRIDGE__*/</script>
<script>
"use strict";
(function () {
  var SVGNS = "http://www.w3.org/2000/svg";
  var grades = null;

  function $(id) { return document.getElementById(id); }
  function fmt(n) {
    return Math.abs(n - Math.round(n)) < 1e-9 ? String(Math.round(n)) : n.toFixed(1);
  }
  function mean(a) { return a.reduce(function (s, v) { return s + v; }, 0) / a.length; }
  function median(a) {
    var s = a.slice().sort(function (x, y) { return x - y; });
    var m = s.length >> 1;
    return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
  }

  function computeBins(vals, count) {
    var lo = Math.min.apply(null, vals), hi = Math.max.apply(null, vals);
    if (lo === hi) { lo -= 1; hi += 1; }
    var w = (hi - lo) / count, bins = [];
    for (var i = 0; i < count; i++) bins.push({ lo: lo + i * w, hi: lo + (i + 1) * w, n: 0 });
    vals.forEach(function (v) {
      var i = Math.min(count - 1, Math.floor((v - lo) / w));
      bins[i].n++;
    });
    return bins;
  }

  /* 4px rounded data-end (top), square at the baseline */
  function topRoundedRect(x, y, w, h, r) {
    r = Math.max(0, Math.min(r, w / 2, h));
    return "M" + x + "," + (y + h) + " v" + (r - h) +
           " q0," + (-r) + " " + r + "," + (-r) + " h" + (w - 2 * r) +
           " q" + r + ",0 " + r + "," + r + " v" + (h - r) + " z";
  }

  function niceTicks(maxV) {
    var step = Math.max(1, Math.ceil(maxV / 4));
    var mag = Math.pow(10, Math.floor(Math.log10(step)));
    var norm = step / mag;
    step = (norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 5 ? 5 : 10) * mag;
    var t = [];
    for (var v = 0; v <= maxV; v += step) t.push(v);
    if (t[t.length - 1] < maxV) t.push(t[t.length - 1] + step);
    return t;
  }

  function render() {
    if (!grades || !grades.length) return;
    $("app").hidden = false;
    $("empty").hidden = true;
    $("sub").textContent = grades.length + " score" + (grades.length === 1 ? "" : "s");
    $("mean").textContent = fmt(mean(grades));
    $("median").textContent = fmt(median(grades));
    $("min").textContent = fmt(Math.min.apply(null, grades));
    $("max").textContent = fmt(Math.max.apply(null, grades));

    var sel = $("bins").value;
    var count = sel === "auto"
      ? Math.min(10, Math.max(3, new Set(grades).size))
      : parseInt(sel, 10);
    var bins = computeBins(grades, count);
    drawChart(bins);
    fillTable(bins);
    if (window.MCPApp) MCPApp.reportSize();
  }

  function drawChart(bins) {
    var chart = $("chart");
    var old = chart.querySelector("svg");
    if (old) old.remove();

    var W = Math.max(320, chart.clientWidth || 560), H = 240;
    var m = { t: 10, r: 8, b: 26, l: 36 };
    var iw = W - m.l - m.r, ih = H - m.t - m.b;
    var maxN = Math.max.apply(null, bins.map(function (b) { return b.n; }));
    var ticks = niceTicks(maxN);
    var yMax = ticks[ticks.length - 1] || 1;
    var y = function (n) { return m.t + ih - (n / yMax) * ih; };
    var bw = iw / bins.length;

    var svg = document.createElementNS(SVGNS, "svg");
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.setAttribute("height", H);

    var css = getComputedStyle(document.documentElement);
    var C = function (v) { return css.getPropertyValue(v).trim(); };

    ticks.forEach(function (t) { // recessive hairline grid + tick labels
      var ly = y(t);
      var ln = document.createElementNS(SVGNS, "line");
      ln.setAttribute("x1", m.l); ln.setAttribute("x2", W - m.r);
      ln.setAttribute("y1", ly); ln.setAttribute("y2", ly);
      ln.setAttribute("stroke", t === 0 ? C("--axis") : C("--grid"));
      ln.setAttribute("stroke-width", "1");
      svg.appendChild(ln);
      var tx = document.createElementNS(SVGNS, "text");
      tx.setAttribute("x", m.l - 6); tx.setAttribute("y", ly + 3.5);
      tx.setAttribute("text-anchor", "end");
      tx.setAttribute("font-size", "10.5"); tx.setAttribute("fill", C("--muted"));
      tx.textContent = String(t);
      svg.appendChild(tx);
    });

    var tip = $("tip");
    bins.forEach(function (b, i) {
      var x = m.l + i * bw;
      if (b.n > 0) {
        var p = document.createElementNS(SVGNS, "path");
        p.setAttribute("d", topRoundedRect(x + 1, y(b.n), Math.max(1, bw - 2), ih - (y(b.n) - m.t), 4));
        p.setAttribute("fill", C("--s1"));
        p.setAttribute("class", "bar");
        svg.appendChild(p);
      }
      // hit target bigger than the mark: full-height invisible band per bin
      var hit = document.createElementNS(SVGNS, "rect");
      hit.setAttribute("x", x); hit.setAttribute("y", m.t);
      hit.setAttribute("width", bw); hit.setAttribute("height", ih);
      hit.setAttribute("fill", "transparent");
      hit.addEventListener("pointermove", function (ev) {
        var pct = grades.length ? Math.round(100 * b.n / grades.length) : 0;
        tip.replaceChildren();
        var v = document.createElement("div"); v.className = "v";
        v.textContent = b.n + " student" + (b.n === 1 ? "" : "s");
        var k = document.createElement("div"); k.className = "k";
        k.textContent = fmt(b.lo) + " – " + fmt(b.hi) + " · " + pct + "%";
        tip.append(v, k);
        tip.style.display = "block";
        var r = chart.getBoundingClientRect();
        var tx2 = Math.min(ev.clientX - r.left + 12, r.width - tip.offsetWidth - 4);
        tip.style.left = Math.max(0, tx2) + "px";
        tip.style.top = (ev.clientY - r.top - tip.offsetHeight - 10) + "px";
        var bar = svg.querySelectorAll(".bar");
        bar.forEach(function (el) { el.classList.remove("hot"); });
      });
      hit.addEventListener("pointerleave", function () { tip.style.display = "none"; });
      svg.appendChild(hit);
    });

    // x labels: first, middle, last bin edges
    [0, Math.floor(bins.length / 2), bins.length].forEach(function (i) {
      var v = i === bins.length ? bins[bins.length - 1].hi : bins[i].lo;
      var tx = document.createElementNS(SVGNS, "text");
      tx.setAttribute("x", m.l + i * bw);
      tx.setAttribute("y", H - 8);
      tx.setAttribute("text-anchor", i === 0 ? "start" : i === bins.length ? "end" : "middle");
      tx.setAttribute("font-size", "10.5"); tx.setAttribute("fill", C("--muted"));
      tx.textContent = fmt(v);
      svg.appendChild(tx);
    });

    chart.appendChild(svg);
  }

  function fillTable(bins) {
    var tb = $("tbody");
    tb.replaceChildren();
    bins.forEach(function (b) {
      var tr = document.createElement("tr");
      var c1 = document.createElement("td");
      c1.textContent = fmt(b.lo) + " – " + fmt(b.hi);
      var c2 = document.createElement("td"); c2.className = "num"; c2.textContent = String(b.n);
      var c3 = document.createElement("td"); c3.className = "num";
      c3.textContent = grades.length ? Math.round(100 * b.n / grades.length) + "%" : "0%";
      tr.append(c1, c2, c3);
      tb.appendChild(tr);
    });
  }

  function setData(args) {
    if (!args || !Array.isArray(args.grades) || !args.grades.length) return;
    grades = args.grades.map(Number).filter(function (v) { return isFinite(v); });
    if (args.title) { $("title").textContent = String(args.title); document.title = String(args.title); }
    render();
  }

  $("bins").addEventListener("change", render);
  window.addEventListener("resize", render);

  MCPApp.connect({ name: "grade-distribution", version: "1.0.0" }, {
    onToolInput: function (p) { setData(p.arguments || {}); },
    onHostContextChanged: function () { render(); }
  });
})();
</script>
</body>
</html>
